server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/api/auth/**,/api/roles/**

            - id: shipment-service
              uri: lb://shipment-service
              predicates:
                - Path=/api/shipments/**

            - id: driver-service
              uri: lb://driver-service
              predicates:
                - Path=/api/drivers/**

            - id: dashboard-service
              uri: lb://dashboard-service
              predicates:
                - Path=/api/dashboard/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

jwt:
  secret: logistics-secret-key-logistics-secret-key-logistics-secret-key
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info
