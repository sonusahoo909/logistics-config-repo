management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh,metrics,prometheus,circuitbreakers,circuitbreakerevents

  endpoint:
    health:
      show-details: always

    metrics:
      enabled: true

    prometheus:
      enabled: true

  health:
    circuitbreakers:
      enabled: true

  metrics:
    tags:
      application: ${spring.application.name}

    distribution:
      percentiles-histogram:
        http.server.requests: true

logging:
  pattern:
    # Used by Spring Boot's structured logging support
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

    # Your existing console pattern
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{X-Correlation-Id}] %logger{36} - %msg%n"

resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 20s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenStateEnabled: true

    instances:
      shipmentService:
        baseConfig: default

      driverService:
        baseConfig: default

      authService:
        baseConfig: default

  retry:
    instances:
      shipmentService:
        maxAttempts: 3
        waitDuration: 1s

      driverService:
        maxAttempts: 3
        waitDuration: 1s

      authService:
        maxAttempts: 3
        waitDuration: 1s

  timelimiter:
    instances:
      shipmentService:
        timeoutDuration: 2s

      driverService:
        timeoutDuration: 2s

      authService:
        timeoutDuration: 2s
