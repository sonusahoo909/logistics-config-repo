server:
  port: 8085

spring:
  application:
    name: dashboard-service

eureka:
  instance:
    hostname: localhost
    prefer-ip-address: true

  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: logistics-secret-key-logistics-secret-key-logistics-secret-key
  expiration: 86400000

springdoc:
  api-docs:
    path: /v3/api-docs

  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    feign: DEBUG
